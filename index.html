<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NET_HUB — Network Engineering Knowledge Base</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Source+Sans+3:wght@300;400;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090c;--bg1:#0c0f12;--bg2:#111620;--bg3:#181e2a;--border:#1c2535;--border2:#283347;--text:#c4d4e0;--text2:#607a90;--text3:#374d60;--teal:#00bfa0;--teal2:#009f85;--amber:#f0980a;--red:#e84444;--purple:#9b80f8;--green:#30c97a;--blue:#56a0f0;--fn:'Rajdhani',sans-serif;--fb:'Source Sans 3',sans-serif;--fc:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:15px;line-height:1.65;display:flex;flex-direction:column}
#shell{display:flex;flex:1;overflow:hidden}
#topbar{height:38px;min-height:38px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.bc{font-family:var(--fc);font-size:11px;color:var(--text3);flex:1;display:flex;align-items:center;gap:5px;overflow:hidden;white-space:nowrap}
.bc a{color:var(--text3);text-decoration:none;cursor:pointer;transition:color .15s}.bc a:hover{color:var(--text2)}.bc-sep{opacity:.5}.bc-cur{color:var(--text2)}
#save-ind{font-family:var(--fc);font-size:10px;color:var(--text3);min-width:60px;text-align:right}
#save-ind.saving{color:var(--amber)}#save-ind.saved{color:var(--green)}
#edit-btn{font-family:var(--fc);font-size:11px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:4px 10px;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
#edit-btn:hover{border-color:var(--border2);color:var(--text)}
#edit-btn.active{background:rgba(0,191,160,.1);border-color:var(--teal);color:var(--teal)}
#sidebar{width:220px;min-width:220px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.logo{padding:16px 14px 12px;border-bottom:1px solid var(--border)}
.logo-main{font-family:var(--fn);font-size:21px;font-weight:700;color:var(--teal);letter-spacing:2px}
.logo-sub{font-family:var(--fc);font-size:10px;color:var(--text3);margin-top:2px}
.srch-btn{display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:7px 11px;cursor:pointer;color:var(--text3);font-family:var(--fc);font-size:11px;margin:10px 12px 6px;transition:all .2s}
.srch-btn:hover{border-color:var(--border2);color:var(--text2)}
.srch-kbd{margin-left:auto;font-size:9px;background:var(--bg3);padding:1px 4px;border-radius:2px;border:1px solid var(--border2)}
.n-static{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;border-left:3px solid transparent}
.n-static:hover{background:var(--bg2);color:var(--text)}
.n-static.active{background:rgba(0,191,160,.07);color:var(--teal);border-left-color:var(--teal)}
.n-static .ico{width:16px;text-align:center;font-size:14px;flex-shrink:0}
.ns-div{font-family:var(--fc);font-size:9px;color:var(--text3);padding:8px 12px 2px;letter-spacing:1.5px;text-transform:uppercase}
.t1h{display:flex;align-items:center;gap:6px;padding:6px 10px 6px 12px;cursor:pointer;color:#8aaabf;font-size:13px;font-weight:500;transition:all .15s;user-select:none}
.t1h:hover{background:var(--bg2);color:#c4d4e0}
.t1h.page-active{color:#c4d4e0}
.t1-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chev{font-size:7px;color:var(--text3);transition:transform .2s;flex-shrink:0;margin-left:auto;opacity:.55}
.chev.open{transform:rotate(90deg)}
/* L1 → L2 tree container */
.t1-kids{margin-left:17px;border-left:1px solid rgba(255,255,255,.07);padding-bottom:2px}
/* L2 sub header — chevron LEFT, label RIGHT of chevron */
.t2h{display:flex;align-items:center;gap:4px;padding:5px 8px 5px 9px;cursor:pointer;color:#6a8aa8;font-size:12px;transition:all .15s;position:relative;user-select:none}
.t2h::before{content:'';position:absolute;left:-1px;top:50%;width:9px;height:1px;background:rgba(255,255,255,.07)}
.t2h .chev{margin-left:0;opacity:.5}
.t2h:hover{color:#9ab4c8}
.t2h.page-active{color:#9ab4c8}
/* L2 → L3 tree container */
.t2-kids{margin-left:18px;border-left:1px solid rgba(255,255,255,.05);padding-bottom:2px}
/* L3 page leaf */
.t3i{display:block;padding:3px 8px 3px 9px;cursor:pointer;color:#4e6880;font-size:11.5px;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative}
.t3i::before{content:'';position:absolute;left:-1px;top:50%;width:8px;height:1px;background:rgba(255,255,255,.05)}
.t3i .t3-lbl{padding-left:1px}
.t3i:hover{color:#8aaabf}
.t3i.active{color:var(--teal)}
.t3i.active .t3-lbl{color:var(--teal)}
.nb{margin-top:auto;border-top:1px solid var(--border);padding:6px 0}
#main{flex:1;overflow-y:auto;background:var(--bg);min-width:0}
.ph{padding:26px 34px 0;border-bottom:1px solid var(--border)}
.pt{font-family:var(--fn);font-size:28px;font-weight:700;color:var(--text);letter-spacing:.5px}
.ps{color:var(--text2);font-size:13px;margin-top:3px;margin-bottom:10px}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-family:var(--fc);font-size:10px;padding:2px 6px;border-radius:3px;border:1px solid}
.tg{color:var(--teal);border-color:rgba(0,191,160,.25);background:rgba(0,191,160,.05)}
.tp{color:var(--purple);border-color:rgba(155,128,248,.25);background:rgba(155,128,248,.05)}
.ta{color:var(--amber);border-color:rgba(240,152,10,.25);background:rgba(240,152,10,.05)}
.tb{color:var(--blue);border-color:rgba(86,160,240,.25);background:rgba(86,160,240,.05)}
.tr{color:var(--red);border-color:rgba(232,68,68,.25);background:rgba(232,68,68,.05)}
.tgr{color:var(--green);border-color:rgba(48,201,122,.25);background:rgba(48,201,122,.05)}
.content{padding:24px 34px;max-width:880px}
h2{font-family:var(--fn);font-size:20px;font-weight:600;color:var(--text);margin:26px 0 11px;display:flex;align-items:center;gap:8px}
h2:first-child{margin-top:0}
h3{font-family:var(--fn);font-size:14.5px;font-weight:600;color:var(--text2);margin:16px 0 7px}
p{color:var(--text);margin-bottom:9px;line-height:1.7}
.cb{background:var(--bg1);border:1px solid var(--border);border-radius:5px;margin:12px 0;overflow:hidden}
.ch{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--bg2);border-bottom:1px solid var(--border)}
.cl{font-family:var(--fc);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.cp{font-family:var(--fc);font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:3px;transition:all .15s}
.cp:hover{color:var(--teal);background:rgba(0,191,160,.1)}.cp.ok{color:var(--green)}
pre{padding:13px;overflow-x:auto;font-family:var(--fc);font-size:12.5px;line-height:1.6;color:var(--text)}
code{font-family:var(--fc);font-size:12.5px;background:var(--bg2);padding:2px 5px;border-radius:3px;color:var(--teal)}
.co{border-radius:5px;padding:11px 13px;margin:12px 0;border-left:3px solid;display:flex;gap:10px}
.co-a{background:rgba(240,152,10,.06);border-color:var(--amber)}
.co-r{background:rgba(232,68,68,.06);border-color:var(--red)}
.co-t{background:rgba(0,191,160,.06);border-color:var(--teal)}
.co-p{background:rgba(155,128,248,.06);border-color:var(--purple)}
.co-i{font-size:16px;flex-shrink:0;margin-top:1px}
.co-b strong{display:block;font-family:var(--fn);font-size:13px;font-weight:600;margin-bottom:3px}
.co-b p{margin:0;font-size:13px;color:var(--text2)}
.tw{overflow-x:auto;margin:12px 0}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;background:var(--bg2);color:var(--text2);font-family:var(--fn);font-weight:600;font-size:12px;letter-spacing:.5px;border-bottom:1px solid var(--border2)}
td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}tr:hover td{background:rgba(255,255,255,.02)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin:16px 0}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.ctit{font-family:var(--fn);font-size:16px;font-weight:600;margin-bottom:4px}
.cdesc{font-size:12px;color:var(--text2);line-height:1.5}
.ccnt{font-family:var(--fc);font-size:10px;color:var(--text3);margin-top:8px}
.flow{display:flex;flex-direction:column}
.fs{display:flex;gap:13px;padding-bottom:22px;position:relative}
.fs::before{content:'';position:absolute;left:11px;top:26px;bottom:0;width:2px;background:var(--border)}
.fs:last-child::before{display:none}
.fsn{width:24px;height:24px;border-radius:50%;background:var(--teal);color:#000;font-family:var(--fc);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1}
.fsb{flex:1}.fst{font-family:var(--fn);font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.edit-zone{margin-top:32px;padding-top:24px;border-top:1px solid var(--border)}
.notes-pad{min-height:80px;padding:12px 14px;border-radius:5px;border:1px solid var(--border);background:var(--bg1);color:var(--text);font-family:var(--fb);font-size:14px;line-height:1.7;outline:none;transition:border-color .2s}
.notes-pad[contenteditable="true"]{border-color:rgba(0,191,160,.3);background:var(--bg2);cursor:text}
.notes-pad[contenteditable="true"]:focus{border-color:rgba(0,191,160,.6)}
.notes-pad:empty::before{content:attr(data-ph);color:var(--text3);pointer-events:none;display:block}
.link-list{display:flex;flex-direction:column;gap:6px;margin:10px 0}
.link-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg1);border:1px solid var(--border);border-radius:4px;font-size:13px}
.link-item a{color:var(--teal);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-item a:hover{text-decoration:underline}
.link-item .lbl{color:var(--text2);font-size:11px}
.link-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:0 4px;display:none;transition:color .15s}
.link-del:hover{color:var(--red)}
.edit-mode .link-del{display:block}
.add-link-form{display:none;gap:8px;margin-top:8px;flex-wrap:wrap}
.edit-mode .add-link-form{display:flex}
.add-link-form input{flex:1;min-width:120px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:6px 10px;color:var(--text);font-family:var(--fb);font-size:13px;outline:none}
.add-link-form input:focus{border-color:var(--border2)}
.add-link-form button{background:var(--teal);color:#000;border:none;border-radius:4px;padding:6px 12px;font-family:var(--fn);font-size:13px;font-weight:600;cursor:pointer}
#so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;align-items:flex-start;justify-content:center;padding-top:68px}
#so.open{display:flex}
.sb2{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;width:560px;max-width:90vw;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6)}
.siw{display:flex;align-items:center;gap:10px;padding:12px 15px;border-bottom:1px solid var(--border)}
#si{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--fb);font-size:15px}
#si::placeholder{color:var(--text3)}
.sr2{max-height:360px;overflow-y:auto}
.sr3{padding:10px 15px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.sr3:hover{background:var(--bg3)}.sr3:last-child{border-bottom:none}
.srp{font-family:var(--fn);font-size:14px;color:var(--text);margin-bottom:2px}
.srv{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.srl{font-family:var(--fc);font-size:10px;color:var(--teal);margin-bottom:2px}
.se{padding:32px;text-align:center;color:var(--text3);font-size:13px}
mark{background:rgba(0,191,160,.25);color:inherit;border-radius:2px}
.chat-c{display:flex;flex-direction:column;height:calc(100vh - 76px)}
.chat-m{flex:1;overflow-y:auto;padding:18px 34px;display:flex;flex-direction:column;gap:13px}
.msg{max-width:700px;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end}
.mb{padding:10px 14px;border-radius:6px;font-size:13.5px;line-height:1.65}
.user .mb{background:rgba(0,191,160,.1);border:1px solid rgba(0,191,160,.18)}
.assistant .mb{background:var(--bg2);border:1px solid var(--border)}
.ml{font-family:var(--fc);font-size:10px;color:var(--text3);margin-bottom:3px}
.cia{border-top:1px solid var(--border);padding:12px 34px;display:flex;gap:10px;align-items:flex-end}
#ci{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 13px;color:var(--text);font-family:var(--fb);font-size:13.5px;resize:none;outline:none;max-height:100px;min-height:40px}
#ci:focus{border-color:var(--border2)}
#cs{background:var(--teal);color:#000;border:none;border-radius:6px;padding:8px 15px;font-family:var(--fn);font-size:14px;font-weight:600;cursor:pointer;height:40px}
#cs:hover{background:var(--teal2)}#cs:disabled{opacity:.45;cursor:not-allowed}
.thn{display:flex;gap:4px;padding:10px 14px}
.thn span{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:bnc 1s infinite}
.thn span:nth-child(2){animation-delay:.15s}.thn span:nth-child(3){animation-delay:.3s}
@keyframes bnc{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-5px);opacity:1}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}
.tech-map-svg{display:block;width:100%;height:160px;background:var(--bg1);border:1px solid var(--border);border-radius:6px;margin:14px 0}
</style>
</head>
<body>
<div id="topbar">
  <div class="bc" id="breadcrumb"><a onclick="go('home')">&#x2B21; NET_HUB</a></div>
  <div id="save-ind"></div>
  <button id="edit-btn" onclick="toggleEdit()">&#x270F; Edit</button>
</div>
<div id="shell">
<aside id="sidebar">
  <div class="logo">
    <div class="logo-main">&#x2B21; NET_HUB</div>
    <div class="logo-sub">network engineering knowledge base</div>
  </div>
  <div class="srch-btn" onclick="openSearch()">&#x1F50D; Search... <span class="srch-kbd">&#x2318;K</span></div>
  <div class="ns-div">Quick nav</div>
  <div class="n-static" onclick="go('home')" id="qn-home"><span class="ico">&#x2B21;</span>Home</div>
  <div class="n-static" onclick="go('mm')" id="qn-mm"><span class="ico">&#x1F578;</span>Mind Map</div>
  <div class="n-static" onclick="go('ai')" id="qn-ai"><span class="ico">&#x25C8;</span>AI Assistant</div>
  <div class="ns-div" style="margin-top:4px">Technologies</div>
  <div id="nav-tree"></div>
  <div class="nb">
    <div class="n-static" onclick="window.open('https://github.com/mirek-techlab/net-hub','_blank')"><span class="ico">&#x21D7;</span>GitHub</div>
  </div>
</aside>
<main id="main"><div id="pc"></div></main>
</div>
<div id="so" onclick="closeSrch(event)">
  <div class="sb2">
    <div class="siw"><span>&#x1F50D;</span><input id="si" placeholder="Search topics, commands, keywords..." oninput="doSrch(this.value)" onkeydown="srchKey(event)" autocomplete="off"><span class="srch-kbd" style="cursor:pointer;padding:3px 6px" onclick="closeSrch()">ESC</span></div>
    <div class="sr2" id="sr"></div>
  </div>
</div>
<script>
// ── TREE ─────────────────────────────────────────────────────
const TREE=[
  {id:'cisco',label:'Cisco',col:'#9b80f8',subs:[
    {id:'aci',label:'ACI',pages:[{id:'moquery',label:'moquery'},{id:'tshoot',label:'Troubleshoot'},{id:'theory',label:'Theory'}]},
    {id:'iosxe',label:'IOS XE / XR',pages:[{id:'routing',label:'Routing'},{id:'debug',label:'Debug & Show'}]},
    {id:'asa',label:'ASA Firewall',pages:[{id:'debug',label:'FW Debug'},{id:'theory',label:'Theory & Objects'}]},
    {id:'vpn',label:'VPN / IPsec',pages:[{id:'setup',label:'Setup'},{id:'debug',label:'Debug'},{id:'theory',label:'Theory'}]},
  ]},
  {id:'f5',label:'F5 BIG-IP',col:'#00bfa0',subs:[
    {id:'ltm',label:'BIG-IP LTM',pages:[{id:'workflow',label:'Provisioning'},{id:'monitors',label:'HTTPS Monitors'},{id:'cli',label:'CLI Reference'}]},
    {id:'logs',label:'Logs & Debug',pages:[{id:'ltm',label:'LTM Logs'},{id:'certs',label:'Certificates'}]},
    {id:'apm',label:'APM / SSL-VPN',pages:[{id:'setup',label:'Setup'},{id:'debug',label:'Debug'}]},
  ]},
  {id:'checkpoint',label:'Checkpoint',col:'#e84444',subs:[
    {id:'gw',label:'Gateway / Mgmt',pages:[{id:'policy',label:'Policy'},{id:'objects',label:'Objects'},{id:'tshoot',label:'Troubleshoot'}]},
    {id:'vpn',label:'VPN',pages:[{id:'setup',label:'Setup'},{id:'debug',label:'Debug'}]},
  ]},
  {id:'fortinet',label:'Fortinet',col:'#f0980a',subs:[
    {id:'fg',label:'FortiGate FW',pages:[{id:'policy',label:'Policy & NAT'},{id:'tshoot',label:'Troubleshoot'}]},
    {id:'vpn',label:'VPN',pages:[{id:'ipsec',label:'IPsec VPN'},{id:'ssl',label:'SSL-VPN'}]},
    {id:'cli',label:'CLI Reference',pages:[{id:'commands',label:'Commands'}]},
  ]},
  {id:'paloalto',label:'Palo Alto',col:'#56a0f0',subs:[
    {id:'policy',label:'Policies',pages:[{id:'security',label:'Security Policy'},{id:'nat',label:'NAT'},{id:'qos',label:'QoS'}]},
    {id:'vpn',label:'VPN',pages:[{id:'ipsec',label:'IPsec'},{id:'gp',label:'GlobalProtect'}]},
    {id:'panorama',label:'Panorama',pages:[{id:'setup',label:'Setup'},{id:'mgmt',label:'Management'}]},
  ]},
  {id:'theory',label:'General / RFCs',col:'#30c97a',subs:[
    {id:'routing',label:'Routing Protocols',pages:[{id:'bgp',label:'BGP'},{id:'ospf',label:'OSPF'},{id:'isis',label:'IS-IS'}]},
    {id:'security',label:'Network Security',pages:[{id:'tls',label:'TLS / SSL'},{id:'aaa',label:'AAA & RADIUS'},{id:'acls',label:'ACLs'}]},
    {id:'rfcs',label:'Key RFCs',pages:[{id:'list',label:'RFC Reference'}]},
  ]},
];

// ── STATE ────────────────────────────────────────────────────
let CUR='home',EDIT=false;
const OPEN_T=new Set(),OPEN_S=new Set();
let saveTimer=null,chatHist=[];

// ── STORAGE ──────────────────────────────────────────────────
function stGet(k){try{const v=localStorage.getItem('nhub_'+k);return v?JSON.parse(v):null}catch{return null}}
function stSet(k,v){try{localStorage.setItem('nhub_'+k,JSON.stringify(v))}catch(e){console.warn(e)}}

// ── HELPERS ──────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function cb(lang,code){return'<div class="cb"><div class="ch"><span class="cl">'+lang+'</span><button class="cp" onclick="cpCode(this)">copy</button></div><pre>'+esc(code.trim())+'</pre></div>'}
function co(type,icon,title,body){return'<div class="co co-'+type+'"><div class="co-i">'+icon+'</div><div class="co-b"><strong>'+title+'</strong><p>'+body+'</p></div></div>'}
function tbl(hdrs,rows){return'<div class="tw"><table><thead><tr>'+hdrs.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')+'</tbody></table></div>'}
function tag(cls,txt){return'<span class="tag '+cls+'">'+txt+'</span>'}

// ── SIDEBAR ──────────────────────────────────────────────────
function buildSidebar(){
  let html='';
  TREE.forEach(tech=>{
    const isOT=OPEN_T.has(tech.id)||CUR.startsWith(tech.id+'/');
    html+='<div>';
    html+='<div class="t1h '+(CUR.startsWith(tech.id)?'page-active':'')+'" onclick="tTog(\''+tech.id+'\')"><div class="t1-dot" style="background:'+tech.col+'"></div><span style="flex:1">'+tech.label+'</span><span class="chev '+(isOT?'open':'')+'">&#9658;</span></div>';
    if(isOT){
      html+='<div class="t1-kids">';
      tech.subs.forEach(sub=>{
        const sk=tech.id+'/'+sub.id;
        const isOS=OPEN_S.has(sk)||CUR.startsWith(sk+'/');
        html+='<div><div class="t2h '+(CUR===sk||CUR.startsWith(sk+'/')?'page-active':'')+'" onclick="sTog(\''+sk+'\')"><span class="chev '+(isOS?'open':'')+'">&#9658;</span><span class="t2h-lbl">'+sub.label+'</span></div>';
        if(isOS){
          html+='<div class="t2-kids">';
          sub.pages.forEach(pg=>{
            const route=tech.id+'/'+sub.id+'/'+pg.id;
            html+='<div class="t3i '+(CUR===route?'active':'')+'" onclick="go(\''+route+'\')"><span class="t3-lbl">'+pg.label+'</span></div>';
          });
          html+='</div>';
        }
        html+='</div>';
      });
      html+='</div>';
    }
    html+='</div>';
  });
  document.getElementById('nav-tree').innerHTML=html;
  ['home','mm','ai'].forEach(id=>{const el=document.getElementById('qn-'+id);if(el)el.classList.toggle('active',CUR===id)});
}
function tTog(tid){OPEN_T.has(tid)?OPEN_T.delete(tid):OPEN_T.add(tid);buildSidebar()}
function sTog(key){OPEN_S.has(key)?OPEN_S.delete(key):OPEN_S.add(key);buildSidebar()}

// ── BREADCRUMB ───────────────────────────────────────────────
function buildBC(){
  const bcEl=document.getElementById('breadcrumb');
  if(!bcEl)return;
  if(['home','mm','ai'].includes(CUR)){bcEl.innerHTML='<a onclick="go(\'home\')">&#x2B21; NET_HUB</a>';return}
  const parts=CUR.split('/');
  const tech=TREE.find(t=>t.id===parts[0]);
  let html='<a onclick="go(\'home\')">&#x2B21; NET_HUB</a>';
  if(tech){
    html+='<span class="bc-sep">/</span><a onclick="go(\''+parts[0]+'\')">'+tech.label+'</a>';
    if(parts[1]){
      const sub=tech.subs.find(s=>s.id===parts[1]);
      if(sub){
        html+='<span class="bc-sep">/</span><a onclick="go(\''+parts[0]+'/'+parts[1]+'\')">'+sub.label+'</a>';
        if(parts[2]){
          const pg=sub.pages.find(p=>p.id===parts[2]);
          html+='<span class="bc-sep">/</span><span class="bc-cur">'+(pg?pg.label:parts[2])+'</span>';
        }
      }
    }
  }
  bcEl.innerHTML=html;
}

// ── ROUTER ───────────────────────────────────────────────────
function go(route){
  CUR=route;
  buildSidebar();buildBC();
  const pc=document.getElementById('pc');
  const parts=route.split('/');
  if(route==='home'){pc.innerHTML=pgHome()}
  else if(route==='mm'){pc.innerHTML=pgMM();initMM()}
  else if(route==='ai'){pc.innerHTML=pgAI();chatHist=[]}
  else if(parts.length===1){pc.innerHTML=pgTech(parts[0])+techMapHTML();setTimeout(()=>drawTechMap(parts[0]),30)}
  else if(parts.length===2){pc.innerHTML=pgSub(parts[0],parts[1])}
  else{
    const fn=RENDERERS[route];
    pc.innerHTML=fn?fn():pgStub(route);
    const ez=document.createElement('div');
    ez.className='content';
    ez.innerHTML=renderEditZone(route);
    pc.appendChild(ez);
  }
  document.getElementById('main').scrollTop=0;
  applyEditMode();
}

// ── TECH OVERVIEW MAP ────────────────────────────────────────
function techMapHTML(){return'<div class="content" style="padding-bottom:0"><h2>Overview Map</h2><svg id="tmap" class="tech-map-svg" viewBox="0 0 700 160"></svg></div>'}
function drawTechMap(tid){
  const svg=document.getElementById('tmap');if(!svg)return;
  const tech=TREE.find(t=>t.id===tid);if(!tech)return;
  svg.innerHTML='';
  const bg=mkEl('rect');bg.setAttribute('width','100%');bg.setAttribute('height','100%');bg.setAttribute('fill','#0c0f12');svg.appendChild(bg);
  const cx=75,cy=80,step=100;
  mmR(svg,cx,cy,tech.label,tech.col,true,()=>{});
  tech.subs.forEach((sub,i)=>{
    const sx=cx+step*(i+1)+30*i;
    const ln=mkEl('line');ln.setAttribute('x1',cx+40);ln.setAttribute('y1',cy);ln.setAttribute('x2',sx-45);ln.setAttribute('y2',cy);ln.setAttribute('stroke',tech.col);ln.setAttribute('stroke-width','1.5');ln.setAttribute('opacity','0.3');svg.appendChild(ln);
    mmR(svg,sx,cy,sub.label,tech.col,false,()=>go(tid+'/'+sub.id));
  });
}
function mkEl(tag){return document.createElementNS('http://www.w3.org/2000/svg',tag)}
function mmR(svg,x,y,lbl,col,bold,cb){
  const g=mkEl('g');if(cb)g.style.cursor='pointer';
  const w=Math.max(lbl.length*7+24,76),h=bold?30:24;
  const r=mkEl('rect');r.setAttribute('x',x-w/2);r.setAttribute('y',y-h/2);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('rx','6');r.setAttribute('fill',col);r.setAttribute('fill-opacity',bold?'1':'0.2');r.setAttribute('stroke',col);r.setAttribute('stroke-width','1');
  const t=mkEl('text');t.setAttribute('x',x);t.setAttribute('y',y+5);t.setAttribute('text-anchor','middle');t.setAttribute('fill',bold?'#000':col);t.setAttribute('font-size',bold?'12.5':'11.5');t.setAttribute('font-family','Rajdhani,sans-serif');t.setAttribute('font-weight','600');t.textContent=lbl;
  if(cb){g.addEventListener('mouseenter',()=>r.setAttribute('fill-opacity','0.4'));g.addEventListener('mouseleave',()=>r.setAttribute('fill-opacity','0.2'));g.addEventListener('click',cb)}
  g.appendChild(r);g.appendChild(t);svg.appendChild(g);
}

function pgTech(tid){
  const tech=TREE.find(t=>t.id===tid);
  if(!tech)return pgStub(tid);
  const tagCls={cisco:'tp',f5:'tg',checkpoint:'tr',fortinet:'ta',paloalto:'tb',theory:'tgr'}[tid]||'tg';
  const desc={cisco:'ACI &middot; IOS XE/XR &middot; ASA Firewall &middot; VPN/IPsec',f5:'BIG-IP LTM &middot; Logs &amp; Debug &middot; APM/SSL-VPN',checkpoint:'Gateway &middot; Management &middot; VPN',fortinet:'FortiGate FW &middot; VPN &middot; CLI Reference',paloalto:'Policies &middot; VPN &middot; Panorama',theory:'Routing Protocols &middot; Network Security &middot; RFCs'}[tid]||'';
  let html='<div class="ph"><div class="pt">'+tech.label+'</div><div class="ps">'+desc+'</div><div class="tags">'+tag(tagCls,tech.label)+'</div></div>';
  html+='<div class="content"><h2>Sub-topics</h2><div class="cg">';
  tech.subs.forEach(s=>{
    html+='<div class="card" style="border-top:2px solid '+tech.col+'" onclick="go(\''+tid+'/'+s.id+'\')">'
      +'<div class="ctit">'+s.label+'</div>'
      +'<div class="cdesc">'+s.pages.map(p=>p.label).join(' &middot; ')+'</div>'
      +'<div class="ccnt">'+s.pages.length+' pages</div></div>';
  });
  html+='</div></div>';
  return html;
}

function pgSub(tid,sid){
  const tech=TREE.find(t=>t.id===tid);
  const sub=tech&&tech.subs.find(s=>s.id===sid);
  if(!sub)return pgStub(tid+'/'+sid);
  let html='<div class="ph"><div class="pt">'+sub.label+'</div><div class="ps">'+tech.label+' &rarr; '+sub.label+'</div></div>';
  html+='<div class="content"><h2>Pages</h2><div class="cg">';
  sub.pages.forEach(p=>{
    const route=tid+'/'+sid+'/'+p.id;
    const hasContent=!!RENDERERS[route];
    html+='<div class="card" style="border-top:2px solid '+tech.col+'" onclick="go(\''+route+'\')">'
      +'<div class="ctit">'+p.label+'</div>'
      +(hasContent?'<div class="ccnt" style="color:var(--teal)">has content</div>':'<div class="ccnt">edit to add notes</div>')
      +'</div>';
  });
  html+='</div>';
  html+='<div class="edit-zone">'+renderEditZone(tid+'/'+sid).replace('class="edit-zone"','')+'</div>';
  html+='</div>';
  return html;
}

function pgStub(route){
  const parts=route.split('/');
  const tech=TREE.find(t=>t.id===parts[0]);
  const sub=tech&&tech.subs.find(s=>s.id===parts[1]);
  const pg=sub&&sub.pages.find(p=>p.id===parts[2]);
  return'<div class="ph"><div class="pt">'+(pg?pg.label:parts[parts.length-1])+'</div>'
    +'<div class="ps">'+(tech?tech.label:'')+(sub?' &rarr; '+sub.label:'')+'</div></div>'
    +'<div class="content">'+co('t','&#x1F4DD;','Empty page','No pre-built content yet. Toggle <strong>&#x270F; Edit</strong> to add your notes below.')+'</div>';
}

function renderEditZone(route){
  const rk=route.replace(/\//g,'_');

  return'<div class="edit-zone">'
    +'<h2>&#x1F4DD; Notes</h2>'
    +'<div class="notes-pad" id="npad_'+rk+'" data-rk="'+rk+'" contenteditable="false" data-ph="Click &#x270F; Edit to add notes..." oninput="onNoteInput(this)">'+notes+'</div>'
    +'<h2 style="margin-top:20px">&#x1F517; Links</h2>'
    +'<div class="link-list" id="ll_'+rk+'">'+links.map((l,i)=>'<div class="link-item"><a href="'+esc(l.url)+'" target="_blank">'+esc(l.lbl||l.url)+'</a>'+(l.lbl?'<span class="lbl">'+esc(l.url)+'</span>':'')+'<button class="link-del" onclick="rmLink(\''+rk+'\','+i+')">&#x2715;</button></div>').join('')+'</div>'
    +'<div class="add-link-form" id="alf_'+rk+'">'
    +'<input id="li_u_'+rk+'" placeholder="https://..." style="flex:2">'

    +'<button onclick="addLink(\''+rk+'\')">+ Add</button>'
    +'</div></div>';
}

function onNoteInput(el){
  clearTimeout(saveTimer);setSaveInd('saving');
  saveTimer=setTimeout(()=>{stSet(el.dataset.rk+'_notes',el.innerHTML);setSaveInd('saved')},600);
}
function addLink(rk){
  const u=document.getElementById('li_u_'+rk),l=document.getElementById('li_l_'+rk);
  if(!u||!u.value.trim())return;
  const links=stGet(rk+'_links')||[];
  links.push({url:u.value.trim(),lbl:l?l.value.trim():''});
  stSet(rk+'_links',links);u.value='';if(l)l.value='';
  refreshLinks(rk,links);
}
function rmLink(rk,idx){
  const links=(stGet(rk+'_links')||[]).filter((_,i)=>i!==idx);
  stSet(rk+'_links',links);refreshLinks(rk,links);
}
function refreshLinks(rk,links){
  const ll=document.getElementById('ll_'+rk);if(!ll)return;
  ll.innerHTML=links.map((l,i)=>'<div class="link-item"><a href="'+esc(l.url)+'" target="_blank">'+esc(l.lbl||l.url)+'</a>'+(l.lbl?'<span class="lbl">'+esc(l.url)+'</span>':'')+'<button class="link-del" onclick="rmLink(\''+rk+'\','+i+')" style="'+(EDIT?'display:block':'display:none')+'">&#x2715;</button></div>').join('');
}
function setSaveInd(s){const el=document.getElementById('save-ind');if(!el)return;el.textContent=s==='saving'?'saving\u2026':s==='saved'?'saved \u2713':'';el.className=s;if(s==='saved')setTimeout(()=>{if(el.className==='saved'){el.textContent='';el.className=''}},2000)}

function pgAI(){return'<div class="ph"><div class="pt">&#x25C8; AI Assistant</div><div class="ps">F5 BIG-IP &middot; Cisco ASA &middot; IPsec &middot; Checkpoint &middot; Fortinet &middot; Palo Alto</div></div>'

function aR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}}
async function sendChat(){
  const inp=document.getElementById('ci');const msg=inp.value.trim();if(!msg)return;
  inp.value='';inp.style.height='auto';document.getElementById('cs').disabled=true;
  appendMsg('user',msg);chatHist.push({role:'user',content:msg});
  const th=appendThink();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:'You are a network engineering expert inside NET_HUB knowledge base. Help with: F5 BIG-IP LTM (VS, pools, monitors, persistence, SNAT, iRules, route domains), Cisco ASA (IPsec IKEv2 L2L VPN, crypto maps, tunnel-groups, HA failover, packet capture), Checkpoint, Fortinet FortiGate, Palo Alto, BGP, OSPF, IS-IS, TLS/SSL. Concise practical answers. Include CLI commands. Use triple-backtick code blocks.',messages:chatHist})});
    const data=await res.json();th.remove();
    if(data.content&&data.content[0]){const reply=data.content.map(i=>i.text||'').join('\n');chatHist.push({role:'assistant',content:reply});appendMsg('assistant',reply)}
    else{appendMsg('assistant','&#x26A0;&#xFE0F; API error &mdash; check console.');console.error(data)}
  }catch(err){th.remove();appendMsg('assistant','&#x26A0;&#xFE0F; '+err.message)}
  document.getElementById('cs').disabled=false;document.getElementById('ci').focus();
}
function appendMsg(role,text){
  const c=document.getElementById('cm');if(!c)return;
  const el=document.createElement('div');el.className='msg '+role;
  el.innerHTML='<div class="ml">'+(role==='user'?'You':'NET_HUB AI')+'</div><div class="mb">'+fmtChat(text)+'</div>';
  c.appendChild(el);c.scrollTop=c.scrollHeight;
}
function appendThink(){
  const c=document.getElementById('cm');
  const el=document.createElement('div');el.className='msg assistant';
  el.innerHTML='<div class="ml">NET_HUB AI</div><div class="mb"><div class="thn"><span></span><span></span><span></span></div></div>';
  c.appendChild(el);c.scrollTop=c.scrollHeight;return el;
}
