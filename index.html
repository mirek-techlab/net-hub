<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NET_HUB — Network Engineering Knowledge Base</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Source+Sans+3:wght@300;400;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07090c;
            --bg1: #0c0f12;
            --bg2: #111620;
            --bg3: #181e2a;
            --border: #1c2535;
            --border2: #283347;
            --text: #c4d4e0;
            --text2: #607a90;
            --text3: #374d60;
            --teal: #00bfa0;
            --teal2: #009f85;
            --amber: #f0980a;
            --red: #e84444;
            --green: #30c97a;
            --purple: #9b80f8;
            --blue: #56a0f0;
            --fn: 'Rajdhani', sans-serif;
            --fb: 'Source Sans 3', sans-serif;
            --fc: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--fb);
            font-size: 15px;
            line-height: 1.65;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        #topbar {
            height: 38px;
            min-height: 38px;
            background: var(--bg1);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 10px;
            flex-shrink: 0;
        }

        .bc {
            font-family: var(--fc);
            font-size: 11px;
            color: var(--text3);
            flex: 1;
            display: flex;
            align-items: center;
            gap: 5px;
            overflow: hidden;
            white-space: nowrap;
        }

        .bc a {
            color: var(--text3);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.15s;
        }

        .bc a:hover {
            color: var(--text2);
        }

        .bc-sep {
            opacity: 0.5;
        }

        .bc-cur {
            color: var(--text2);
        }

        #save-ind {
            font-family: var(--fc);
            font-size: 10px;
            color: var(--text3);
            min-width: 60px;
            text-align: right;
        }

        #save-ind.saving {
            color: var(--amber);
        }

        #save-ind.saved {
            color: var(--green);
        }

        #edit-btn {
            font-family: var(--fc);
            font-size: 11px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 10px;
            color: var(--text2);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        #edit-btn:hover {
            border-color: var(--border2);
            color: var(--text);
        }

        #edit-btn.active {
            background: rgba(0, 191, 160, 0.1);
            border-color: var(--teal);
            color: var(--teal);
        }

        /* Main Shell */
        #shell {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 220px;
            min-width: 220px;
            background: var(--bg1);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .logo {
            padding: 16px 14px 12px;
            border-bottom: 1px solid var(--border);
        }

        .logo-main {
            font-family: var(--fn);
            font-size: 21px;
            font-weight: 700;
            color: var(--teal);
            letter-spacing: 2px;
        }

        .logo-sub {
            font-family: var(--fc);
            font-size: 10px;
            color: var(--text3);
            margin-top: 2px;
        }

        .srch-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 7px 11px;
            cursor: pointer;
            color: var(--text3);
            font-family: var(--fc);
            font-size: 11px;
            margin: 12px;
            transition: all 0.15s;
        }

        .srch-btn:hover {
            border-color: var(--border2);
            color: var(--text2);
        }

        .srch-kbd {
            margin-left: auto;
            font-size: 9px;
            background: var(--bg3);
            padding: 1px 4px;
            border-radius: 2px;
            border: 1px solid var(--border2);
        }

        /* Main Content */
        #main {
            flex: 1;
            overflow-y: auto;
            background: var(--bg);
            min-width: 0;
        }

        .ph {
            padding: 26px 34px 0;
            border-bottom: 1px solid var(--border);
        }

        .pt {
            font-family: var(--fn);
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .ps {
            color: var(--text2);
            font-size: 13px;
            margin-top: 3px;
            margin-bottom: 10px;
        }

        .content {
            padding: 24px 34px;
            max-width: 880px;
        }

        h2 {
            font-family: var(--fn);
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            margin: 26px 0 11px;
        }

        h2:first-child {
            margin-top: 0;
        }

        p {
            color: var(--text);
            margin-bottom: 9px;
            line-height: 1.7;
        }

        /* Cards */
        .cg {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 12px;
            margin: 16px 0;
        }

        .card {
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--border2);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .ctit {
            font-family: var(--fn);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .cdesc {
            font-size: 12px;
            color: var(--text2);
            line-height: 1.5;
        }

        .ccnt {
            font-family: var(--fc);
            font-size: 10px;
            color: var(--text3);
            margin-top: 8px;
        }

        /* Edit Zone */
        .edit-zone {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .notes-pad {
            min-height: 80px;
            padding: 12px 14px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--bg1);
            color: var(--text);
            font-family: var(--fb);
            font-size: 14px;
            line-height: 1.7;
            outline: none;
        }

        .notes-pad[contenteditable="true"] {
            border-color: rgba(0, 191, 160, 0.3);
            background: var(--bg2);
            cursor: text;
        }

        .notes-pad[contenteditable="true"]:focus {
            border-color: rgba(0, 191, 160, 0.6);
        }

        /* Links */
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin: 10px 0;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 13px;
        }

        .link-item a {
            color: var(--teal);
            text-decoration: none;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .link-item a:hover {
            text-decoration: underline;
        }

        .link-item .lbl {
            color: var(--text2);
            font-size: 11px;
        }

        .link-del {
            background: none;
            border: none;
            color: var(--text3);
            cursor: pointer;
            font-size: 13px;
            padding: 0 4px;
            display: none;
            transition: color 0.15s;
        }

        .link-del:hover {
            color: var(--red);
        }

        .edit-mode .link-del {
            display: block;
        }

        .add-link-form {
            display: none;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .edit-mode .add-link-form {
            display: flex;
        }

        .add-link-form input {
            flex: 1;
            min-width: 120px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 6px 10px;
            color: var(--text);
            font-family: var(--fb);
            font-size: 13px;
            outline: none;
        }

        .add-link-form input:focus {
            border-color: var(--border2);
        }

        .add-link-form button {
            background: var(--teal);
            color: #000;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-family: var(--fn);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .add-link-form button:hover {
            background: var(--teal2);
        }

        /* Search Overlay */
        #so {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            z-index: 100;
            align-items: flex-start;
            justify-content: center;
            padding-top: 68px;
        }

        #so.open {
            display: flex;
        }

        .sb2 {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 8px;
            width: 560px;
            max-width: 90vw;
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        }

        .siw {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }

        #si {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: var(--fb);
            font-size: 15px;
        }

        #si::placeholder {
            color: var(--text3);
        }

        .sr2 {
            max-height: 360px;
            overflow-y: auto;
        }

        .sr3 {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        .sr3:hover {
            background: var(--bg3);
        }

        .sr3:last-child {
            border-bottom: none;
        }

        .srp {
            font-family: var(--fn);
            font-size: 14px;
            color: var(--text);
            margin-bottom: 2px;
        }

        .srv {
            font-size: 11px;
            color: var(--text3);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .srl {
            font-family: var(--fc);
            font-size: 10px;
            color: var(--teal);
            margin-bottom: 2px;
        }

        .se {
            padding: 32px;
            text-align: center;
            color: var(--text3);
            font-size: 13px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border2);
        }
    </style>
</head>
<body>
    <!-- Top Bar with Breadcrumb -->
    <div id="topbar">
        <div class="bc" id="breadcrumb">
            <a onclick="app.navigate('home')">⬛ NET_HUB</a>
        </div>
        <div id="save-ind"></div>
        <button id="edit-btn" onclick="app.toggleEditMode()">✏️ Edit</button>
    </div>

    <!-- Main Shell -->
    <div id="shell">
        <!-- Sidebar Navigation -->
        <aside id="sidebar">
            <div class="logo">
                <div class="logo-main">⬛ NET_HUB</div>
                <div class="logo-sub">network engineering knowledge base</div>
            </div>
            <div class="srch-btn" onclick="app.openSearch()">🔍 Search... <span class="srch-kbd">⌘K</span></div>
            <div style="flex: 1; overflow-y: auto;" id="nav-tree"></div>
            <div style="margin-top: auto; border-top: 1px solid var(--border); padding: 6px 0;">
                <div style="display: flex; align-items: center; gap: 8px; padding: 7px 12px; cursor: pointer; color: #92b0c4; font-size: 13px;" onclick="window.open('https://github.com/mirek-techlab/net-hub','_blank')">
                    <span style="width: 16px; text-align: center; font-size: 14px;">↗</span>GitHub
                </div>
            </div>
        </aside>

        <!-- Primary Content Area -->
        <main id="main">
            <div id="pc"></div>
        </main>
    </div>

    <!-- Search Overlay -->
    <div id="so" onclick="app.closeSearch(event)">
        <div class="sb2">
            <div class="siw">
                <span>🔍</span>
                <input id="si" placeholder="Search topics, commands, keywords..." 
                       oninput="app.onSearchInput(this.value)" 
                       onkeydown="app.onSearchKeydown(event)" 
                       autocomplete="off">
                <span style="cursor: pointer; color: var(--text3);" onclick="app.closeSearch()">×</span>
            </div>
            <div class="sr2" id="sr"></div>
        </div>
    </div>

    <!-- Application Controller -->
    <script src="main.js"></script>
</body>
</html>
